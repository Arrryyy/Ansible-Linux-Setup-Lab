---
- name: Install pip dependencies
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-flask
    state: present
    update_cache: true

- name: Create app directory
  ansible.builtin.file:
    path: /opt/app
    state: directory
    mode: '0755'

- name: Copy Flask app
  ansible.builtin.copy:
    dest: /opt/app/app.py
    mode: '0644'
    content: |
      from flask import Flask
      app = Flask(__name__)

      @app.route('/')
      def home():
          return 'Hello from the App Server!'

      if __name__ == '__main__':
          app.run(host='0.0.0.0', port=5000)

- name: Start Flask app
  ansible.builtin.shell: |
    nohup python3 /opt/app/app.py &
  args:
    executable: /bin/bash
